<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFB020" stop-opacity="0.20"/>
      <stop offset="0.6" stop-color="#FFB020" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0H0V60" fill="none" stroke="#ECEBE3" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#0E0E0C"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- marca -->
  <g transform="translate(80, 80)">
    <text font-family="'Space Grotesk', sans-serif" font-size="30" font-weight="600" fill="#ECEBE3" letter-spacing="-0.5">Cuadrilla</text>
    <circle cx="188" cy="22" r="5" fill="#FFB020"/>
  </g>

  <!-- meta mono -->
  <text x="80" y="300" font-family="'IBM Plex Mono', monospace" font-size="20" fill="#FFB020" letter-spacing="3">ESTUDIO DE SOFTWARE · EL BAJÍO, MX</text>

  <!-- titular -->
  <text x="78" y="380" font-family="'Space Grotesk', sans-serif" font-size="96" font-weight="500" fill="#ECEBE3" letter-spacing="-3">Tú diriges.</text>
  <text x="78" y="480" font-family="'Space Grotesk', sans-serif" font-size="96" font-weight="500" fill="#ECEBE3" letter-spacing="-3">Nosotros <tspan font-family="'Instrument Serif', serif" font-style="italic" fill="#FFB020" font-weight="400">construimos</tspan>.</text>

  <!-- subtítulo -->
  <text x="80" y="560" font-family="'Inter', sans-serif" font-size="26" fill="#ECEBE3" fill-opacity="0.64">Software terminado a la medida — facturación CFDI, sistemas, dashboards e integraciones.</text>
</svg>
